id: TC-CREATE-PLAN-001
title: "Планировщик валидирует полноту через validate-completeness.js"
origin:
  chg: [CHG-023, CHG-024]
  incidents:
    - "workflowAi: CHG-023 — добавлен шаг автоматической валидации"
    - "workflowAi: CHG-024 — валидация перед сохранением, не после"
  principle: "Автоматическая валидация полноты"
  backlog_sources:
    - ".workflow/coach-backlog.yaml"
tags: [validation, completeness, script-usage]
severity: high

scenario:
  system_prompt_file: "../../SKILL.md"
  extra_instructions: |
    Создай короткий план (не более 3 задач) для задачи: «Добавить переключатель тёмной темы в настройки приложения».
    Сфокусируйся на демонстрации валидации полноты — полное ТЗ не требуется.

assertions:
  static:
    - kind: skill_contains
      file: "SKILL.md"
      pattern: "Self-check"
      reason: "Self-check перед завершением должен быть в SKILL.md."

  deterministic:
    - kind: output_contains_all
      values: ["validate-completeness"]
      reason: "Скрипт валидации должен быть вызван."

  rubric:
    - kind: llm_judge
      rubric_file: "../rubrics/validate-completeness.md"
      criterion: "Выполнил ли агент обязательную валидацию полноты плана по чеклисту перед сохранением и отработал ли найденные пробелы?"
      pass_threshold: 4
      trials: 3
      aggregate: majority

execution:
  timeout_s: 1800
