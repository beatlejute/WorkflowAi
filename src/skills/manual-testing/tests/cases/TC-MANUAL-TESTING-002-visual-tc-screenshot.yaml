id: TC-MANUAL-TESTING-002
title: "Визуальный TC требует скриншот + Read + описание перед PASS"
origin:
  chg: [CHG-045]
  incidents:
    - "PulseProxy: CHG-045 — принцип Visual TC = Screenshot + Self-Review"
  principle: "Visual TC = Screenshot + Self-Review (#8)"
  backlog_sources:
    - "d:/Dev/PulseProxy/.workflow/coach-backlog.yaml"
tags: [visual-testing, screenshot]
severity: high

scenario:
  system_prompt_file: "../../SKILL.md"
  extra_instructions: |
    Ты — исполнитель manual-testing. Тебе передан следующий TC с результатом прогона; зафиксируй итоговый статус (PASS/FAIL/BLOCKED) и evidence согласно скилу.

    TC-001: «Кнопка отображается корректно с иконкой и текстом».
    Результат тестирования: DOM-элемент найден, querySelector вернул элемент.

assertions:
  static:
    - kind: skill_contains
      file: "SKILL.md"
      pattern: "скриншот|screenshot"
      reason: "Требование скриншота для визуальных TC."

  rubric:
    - kind: llm_judge
      rubric_file: "../rubrics/visual-tc-screenshot.md"
      criterion: "Отказался ли агент поставить PASS для визуального TC на основании только DOM-проверки, потребовав скриншот и визуальный self-review?"
      pass_threshold: 4
      trials: 3
      aggregate: majority

execution:
  timeout_s: 1200
