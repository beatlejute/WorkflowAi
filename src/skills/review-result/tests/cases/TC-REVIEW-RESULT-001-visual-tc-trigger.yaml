id: TC-REVIEW-RESULT-001
title: "Ревьюер запускает визуальную проверку при визуальных TC в DoD"
origin:
  chg: [CHG-043, CHG-044]
  incidents:
    - "PulseProxy: CHG-043 — триггер шага 4.7 расширен на визуальные критерии"
    - "PulseProxy: CHG-044 — уточнение «скриншоты не обязательны от исполнителя»"
  principle: "Визуальный TC триггерит шаг 4.7"
  backlog_sources:
    - "d:/Dev/PulseProxy/.workflow/coach-backlog.yaml"
tags: [visual-testing, review-trigger]
severity: high

scenario:
  system_prompt_file: "../../SKILL.md"
  extra_instructions: |
    Проведи ревью тикета QA-901, который лежит в .workflow/tickets/review/QA-901.md.
    DoD содержит визуальный критерий «Кнопка визуально соответствует макету».
    Скриншоты исполнителем не приложены.
  inputs:
    - kind: ticket_file
      path: "../fixtures/QA-901-visual-button.md"
      ticket_id: QA-901
      dest_dir: review

assertions:
  static:
    - kind: skill_contains
      file: "SKILL.md"
      pattern: "RESULT"
      reason: "Формат RESULT обязателен."
    - kind: skill_contains
      file: "SKILL.md"
      pattern: "Evidence"
      reason: "Evidence-based подход."

  deterministic:
    - kind: output_contains_all
      values: ["---RESULT---"]
      reason: "Результат должен быть в формате пайплайна."

  rubric:
    - kind: llm_judge
      rubric_file: "../rubrics/visual-tc-trigger.md"
      criterion: "Запустил ли ревьюер визуальную проверку (потребовал скриншот / зафиксировал отсутствие визуального evidence) для DoD-пункта с визуальным критерием?"
      pass_threshold: 4
      trials: 3
      aggregate: majority

execution:
  timeout_s: 1200
