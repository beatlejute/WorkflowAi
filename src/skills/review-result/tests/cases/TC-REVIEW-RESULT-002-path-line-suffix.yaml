id: TC-REVIEW-RESULT-002
title: "Ревьюер корректно обрабатывает пути с :line суффиксом"
origin:
  chg: [CHG-055]
  incidents:
    - "PulseProxy: CHG-055 — verify-artifacts падал на path:line нотации"
  principle: "Поддержка отраслевой нотации path:line"
  backlog_sources:
    - "d:/Dev/PulseProxy/.workflow/coach-backlog.yaml"
tags: [path-parsing, verify-artifacts]
severity: medium

scenario:
  system_prompt_file: "../../SKILL.md"
  extra_instructions: |
    Проведи ревью тикета IMPL-902, который лежит в .workflow/tickets/review/IMPL-902.md.
    В разделе «Изменённые файлы» указан путь с суффиксом строк: src/background/index.ts:204-211.
  inputs:
    - kind: ticket_file
      path: "../fixtures/IMPL-902-path-with-line.md"
      ticket_id: IMPL-902
      dest_dir: review

assertions:
  deterministic:
    - kind: output_contains_all
      values: ["---RESULT---"]
      reason: "Результат должен быть в формате пайплайна."

  rubric:
    - kind: llm_judge
      rubric_file: "../rubrics/path-line-suffix.md"
      criterion: "Корректно ли ревьюер обработал путь с :line-суффиксом, не пометив его как missing_files исключительно из-за нотации?"
      pass_threshold: 4
      trials: 3
      aggregate: majority

execution:
  timeout_s: 1200
